# .github/workflows/android-tests.yml
name: Android Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Отменяем предыдущие запуски для того же PR, чтобы не тратить время
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest  # Используем Linux-раннер (быстрее и дешевле)

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем JDK (укажите вашу версию, например 17, 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # или 'zulu', 'corretto'
          java-version: '21'
          cache: 'gradle'          # Включаем кеш Gradle

      # 3. Делаем gradlew исполняемым
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. (Опционально) Валидируем Gradle Wrapper для безопасности
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # 5. Запускаем тесты с флагами для вашего случая (Byte Buddy + вывод)
      - name: Run unit tests
        run: |
          ./gradlew :domain:testDebugUnitTest \
            --rerun-tasks \
            --no-daemon \
            --stacktrace \
            -Dnet.bytebuddy.experimental=true

      # 6. (Опционально) Сохраняем отчёт о тестах как артефакт
      - name: Upload test report
        if: always()  # Загружаем даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: test-report-domain
          path: domain/build/reports/tests/testDebugUnitTest/
          retention-days: 7
